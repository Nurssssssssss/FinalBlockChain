[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test"
script = "script"
solc_version = "0.8.35"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./deployments" }]
ffi = false
bytecode_hash = "none"
cbor_metadata = false

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 64
depth = 64
fail_on_revert = false

[profile.ci]
fuzz = { runs = 512 }
invariant = { runs = 128, depth = 96, fail_on_revert = false }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
