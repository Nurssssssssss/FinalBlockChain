specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GovernanceToken
    network: base-sepolia
    source:
      abi: GovernanceToken
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TokenHolder
      abis:
        - name: GovernanceToken
          file: ./abis/GovernanceToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: DelegateVotesChanged(indexed address,uint256,uint256)
          handler: handleDelegateVotesChanged
      file: ./src/mapping.ts
  - kind: ethereum
    name: YieldVault
    network: base-sepolia
    source:
      abi: YieldVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - VaultPosition
        - ProtocolStat
      abis:
        - name: YieldVault
          file: ./abis/YieldVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleVaultDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleVaultWithdraw
        - event: RewardsAdded(indexed address,uint256)
          handler: handleRewardsAdded
      file: ./src/mapping.ts
  - kind: ethereum
    name: ConstantProductAMM
    network: base-sepolia
    source:
      abi: ConstantProductAMM
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Swap
        - LiquidityEvent
        - ProtocolStat
      abis:
        - name: ConstantProductAMM
          file: ./abis/ConstantProductAMM.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,indexed address,uint256,address,uint256)
          handler: handleSwap
        - event: LiquidityAdded(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
      file: ./src/mapping.ts
  - kind: ethereum
    name: DeFiGovernor
    network: base-sepolia
    source:
      abi: DeFiGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Proposal
      abis:
        - name: DeFiGovernor
          file: ./abis/DeFiGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,indexed address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
      file: ./src/mapping.ts
